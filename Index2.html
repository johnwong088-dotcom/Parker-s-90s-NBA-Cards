<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My NBA Card Shop</title>
    <style>
        /* Updated CSS with NBA Colors */
        body { font-family: 'Segoe UI', sans-serif; background: #17408B; margin: 0; padding: 20px; color: white; }
        h1 { text-align: center; color: #C9082A; background: white; padding: 10px; border-radius: 10px; }
        #searchBar { width: 100%; padding: 12px; margin-bottom: 20px; border: none; border-radius: 25px; box-sizing: border-box; }
        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; text-align: center; color: #333; }
        .card img { max-width: 100%; border-radius: 10px; height: 250px; object-fit: cover; background: #eee; }
        .price { color: #27ae60; font-weight: bold; font-size: 1.4em; margin: 10px 0; }
        /* Viber Purple Color */
        .viber-btn { background: #7360f2; color: white; padding: 12px; border: none; border-radius: 25px; cursor: pointer; text-decoration: none; display: block; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🏀 NBA CARD SHOP</h1>
    <input type="text" id="searchBar" placeholder="Search player or team..." onkeyup="filterCards()">

    <div class="card-container" id="cardGrid"></div>

    <script>
        // CHANGE THIS TO YOUR VIBER NUMBER (must start with 63)
        const myViberNumber = "639171234567"; 

        const myCards = [
            { id: 1, name: "LeBron James Prizm", price: "₱5,000", team: "Lakers", img: "https://via.placeholder.com/200x250?text=LeBron" },
            { id: 2, name: "Stephen Curry Select", price: "₱4,500", team: "Warriors", img: "https://via.placeholder.com/200x250?text=Curry" },
            { id: 3, name: "Luka Doncic Rookie", price: "₱12,000", team: "Mavericks", img: "https://via.placeholder.com/200x250?text=Luka" },
        ];

        function displayCards(cards) {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = cards.map(card => `
                <div class="card">
                    <img src="${card.img}" alt="${card.name}">
                    <h3>${card.name}</h3>
                    <p><strong>${card.team}</strong></p>
                    <div class="price">${card.price}</div>
                    <a class="viber-btn" href="viber://chat?number=%2B${myViberNumber}">
                        Message on Viber
                    </a>
                </div>
            `).join('');
        }

        function filterCards() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = myCards.filter(c => c.name.toLowerCase().includes(query) || c.team.toLowerCase().includes(query));
            displayCards(filtered);
        }

        displayCards(myCards);
    </script>
</body>
</html>
